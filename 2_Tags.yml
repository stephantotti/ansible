# Tags permitem executar apenas tasks específicas de uma playbook sem rodar tudo. Útil quando você quer aplicar apenas uma parte da configuração.
---

- name: Testing Tag
  hosts: all 
  tasks:
   - name: SISOP | Set a Hostname
     ansible.builtin.hostname:
       name: srv01
       use: systemd
     tags: hostname 

   - name: SISOP | Disable SELINUX (Temp)
     ansible.builtin.selinux: state=disabled
     tags:
     - security
     - selinux 

   - name: COPY | Copy ansible.cfg
     ansible.builtin.copy:
       src: /etc/ansible/ansible.cfg
       dest: /tmp/ansible.cfg
       owner: stephan
       group: stephan
     tags: copy

...

# o --list-tasks mostra todas as tasks
# ex: ansible-playbook -i inventary/hosts -l debian01 --tag copy playbooks/2_Tag.yml