# Variáveis definidas dentro da própria playbook. Permitem reutilizar valores em múltiplos lugares sem repetição
---

- name: Testando variaveis
  hosts: rocky01
  vars:
    message: "Mensagem de Teste atraves de Variavel"
    packages: 
      - htop
      - vim
  tasks:
   - name: DEBUG | {{ message }} # no nome da tarefa não precisa de ""
     ansible.builtin.debug:
       msg: "{{ message }}" # dentro da tarefa é obrigatório o uso de ""

   - name: DNF | Install packages
     ansible.builtin.dnf:
       name: "{{ packages }}"
       state: latest
...

# instalação de pacotes precisa do modo become -b (elevação de privilégios)