# Gera sequências numéricas ou alfanuméricas automaticamente. Útil para criar múltiplos recursos com nomes padronizados sem precisar listar cada um.
---

- name: With Sequence 
  hosts: rocky01
  tasks: 
    - name: USER | Add User 
      ansible.builtin.user:
        name: "{{ item }}"
        state: present
        groups: "wheel"
      with_sequence: start=0 end=9 format=user%x
      
...