# Variáveis carregadas de um arquivo externo. Separa os dados da lógica, facilitando manutenção e reuso em diferentes ambientes.
---

- name: Testando variaveis
  hosts: rocky01
  vars_files: /etc/ansible/playbooks/vars_files.yaml    
  tasks:  
   - name: DNF | Install packages
     ansible.builtin.dnf:
       name: "{{ packages }}"
       state: latest

...

